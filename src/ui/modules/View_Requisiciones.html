<style>
  .glass-input {
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(8px);
    border: 1px solid rgba(0,0,0,0.05);
    transition: all 0.2s ease;
  }
  .glass-input:focus {
    background: rgba(255, 255, 255, 0.9);
    border-color: var(--color-primary);
    box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.1);
  }
</style>

<div class="split-view" style="display:flex; flex-wrap:wrap; height:calc(100vh - 80px); gap:var(--space-4); box-sizing:border-box;">
  
  <!-- PANEL IZQUIERDO: Visor PDF (60%) -->
  <div class="card" style="flex: 1 1 60%; min-width: 300px; display:flex; flex-direction:column; position:relative; overflow:hidden; padding:0;">
    <div style="padding:var(--space-3); background:var(--color-surface-dim); border-bottom:1px solid var(--color-neutral-200); display:flex; justify-content:space-between; align-items:center;">
      <div style="font-weight:600; color:var(--color-neutral-800); display:flex; align-items:center; gap:var(--space-2);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
          <polyline points="14 2 14 8 20 8"></polyline>
          <line x1="16" y1="13" x2="8" y2="13"></line>
          <line x1="16" y1="17" x2="8" y2="17"></line>
        </svg>
        Visor de Documento
      </div>
      
      <!-- Toolbar -->
      <div id="pdf-toolbar" style="display:none; align-items:center; gap:var(--space-2);">
        <button type="button" class="btn-ghost btn-sm" onclick="changePage(-1)" aria-label="Página anterior">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <span id="page-num" style="font-size:var(--text-sm); font-weight:500;">0</span>
        <span style="font-size:var(--text-sm); color:var(--color-neutral-500);">/</span>
        <span id="page-count" style="font-size:var(--text-sm); color:var(--color-neutral-500);">0</span>
        <button type="button" class="btn-ghost btn-sm" onclick="changePage(1)" aria-label="Página siguiente">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
        
        <div style="width:1px; height:16px; background:var(--color-neutral-300); margin:0 var(--space-2);"></div>
        
        <button type="button" class="btn-ghost btn-sm" onclick="zoomPDF(-0.25)" aria-label="Alejar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        </button>
        <button type="button" class="btn-ghost btn-sm" onclick="zoomPDF(0.25)" aria-label="Acercar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        </button>
      </div>
    </div>
    
    <div id="pdf-container" style="flex:1; overflow:auto; background:var(--color-neutral-100); display:flex; justify-content:center; align-items:flex-start; padding:var(--space-4);">
      <div id="pdf-empty-state" style="margin:auto; text-align:center; color:var(--color-neutral-500);">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="margin-bottom:var(--space-2);"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
        <p style="font-size:var(--text-sm);">Selecciona un archivo PDF para visualizarlo aquí</p>
      </div>
      <canvas id="pdf-canvas" style="display:none; box-shadow:var(--shadow-md); border-radius:var(--radius-sm);"></canvas>
    </div>
  </div>

  <!-- PANEL DERECHO: Formulario (40%) -->
  <div class="card" style="flex: 1 1 35%; min-width: 300px; display:flex; flex-direction:column; overflow-y:auto; background:var(--color-surface-dim);">
    <h2 style="font-size:var(--text-xl); font-weight:700; color:var(--color-neutral-900); margin-bottom:var(--space-5); display:flex; align-items:center; gap:var(--space-2);">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--color-primary)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
        <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
      </svg>
      Captura de Oficio
    </h2>
    
    <form id="form-intake" onsubmit="handleProcessIntake(event)">
      <!-- File input -->
      <div class="input-group" style="margin-bottom:var(--space-5); background:rgba(255,255,255,0.4); backdrop-filter:blur(10px); padding:var(--space-3); border-radius:var(--radius-md); border:1px dashed var(--color-primary);">
        <label style="display:block; font-size:var(--text-xs); font-weight:600; color:var(--color-neutral-700); margin-bottom:var(--space-1);">1. Oficio Escaneado (.pdf)</label>
        <input type="file" id="intake-file" accept=".pdf" class="input-field" required onchange="handleFileSelect(event)" style="background:transparent; border:none; padding:0;">
      </div>

      <div class="input-group" style="margin-bottom:var(--space-4);">
        <label style="display:block; font-size:var(--text-xs); font-weight:600; color:var(--color-neutral-700); margin-bottom:var(--space-1);">2. Referencia de Oficio</label>
        <input type="text" id="intake-oficio" class="input-field glass-input" placeholder="Ej. UCI/120/2026" required>
      </div>

      <div class="input-group" style="margin-bottom:var(--space-4);">
        <label style="display:block; font-size:var(--text-xs); font-weight:600; color:var(--color-neutral-700); margin-bottom:var(--space-1);">3. Tipo de Trámite</label>
        <select id="intake-tipo" class="input-field glass-input" required>
          <option value="" disabled selected>Seleccione...</option>
          <option value="COMPRA POR FONDO">Compra por Fondo</option>
          <option value="LICITACION PUBLICA">Licitación Pública</option>
          <option value="ADJUDICACION DIRECTA">Adjudicación Directa</option>
        </select>
      </div>

      <div class="input-group" style="margin-bottom:var(--space-4);">
        <label style="display:block; font-size:var(--text-xs); font-weight:600; color:var(--color-neutral-700); margin-bottom:var(--space-1);">4. Fecha de Recepción</label>
        <input type="date" id="intake-fecha" class="input-field glass-input" required>
      </div>

      <div class="input-group" style="margin-bottom:var(--space-6);">
        <label style="display:block; font-size:var(--text-xs); font-weight:600; color:var(--color-neutral-700); margin-bottom:var(--space-1);">5. Servicio / Unidad Solicitante</label>
        <input type="text" id="intake-servicio" list="unidades-list" class="input-field glass-input" placeholder="Escriba o seleccione..." required autocomplete="off">
        <datalist id="unidades-list">
          <option value="UNIDAD DE CUIDADOS INTENSIVOS">
          <option value="LABORATORIO CLINICO">
          <option value="URGENCIAS ADULTOS">
          <option value="QUIROFANOS CENTRALES">
          <option value="BANCO DE SANGRE">
          <option value="FARMACIA HOSPITALARIA">
        </datalist>
      </div>

      <button type="submit" id="btn-submit-intake" class="btn btn-primary" style="width:100%; justify-content:center; box-shadow:var(--shadow-md);">
        Registrar y Generar Expediente
      </button>
    </form>
  </div>
</div>
