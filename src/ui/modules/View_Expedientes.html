<style>
  .library-container {
    display: flex; flex-direction: column; gap: 32px;
  }
  .year-section {
    position: relative;
  }
  .year-header {
    display: flex; align-items: center; gap: 12px; margin-bottom: 16px;
    padding-bottom: 8px; border-bottom: 1px solid var(--color-neutral-200);
  }
  .year-title {
    font-size: 18px; font-weight: 800; color: var(--color-primary);
  }
  .year-count {
    font-size: 12px; font-weight: 600; color: var(--color-neutral-400);
    background: var(--color-neutral-100); padding: 2px 8px; border-radius: 12px;
  }
  
  .expediente-row {
    display: grid; grid-template-columns: 140px 1fr 180px 140px 100px;
    align-items: center; gap: 16px; padding: 12px 20px;
    background: var(--color-surface); border-radius: var(--radius-md);
    margin-bottom: 8px; transition: all 0.2s ease;
    border: 1px solid transparent; cursor: pointer;
  }
  .expediente-row:hover {
    background: var(--color-surface-dim); border-color: var(--color-primary-light);
    transform: translateX(4px); box-shadow: var(--shadow-md);
  }
  
  .folio-cell { font-weight: 700; color: var(--color-neutral-900); font-family: var(--font-mono); font-size: 13px; }
  .servicio-cell { font-size: 13px; color: var(--color-neutral-700); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .fecha-cell { font-size: 12px; color: var(--color-neutral-500); }
  
  /* Filter bar styles */
  .filter-bar {
    display: flex; gap: 16px; background: var(--color-surface);
    padding: 16px 24px; border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm); margin-bottom: 32px;
    align-items: flex-end; border: 1px solid var(--color-neutral-200);
  }
</style>

<div class="view-header" style="margin-bottom: 24px;">
  <div>
    <h1 style="font-size: 24px; font-weight: 800; color: var(--color-neutral-900);">Biblioteca de Expedientes</h1>
    <p style="color: var(--color-neutral-500); font-size: 14px;">Acervo histórico digital de todas las gestiones DSA</p>
  </div>
</div>

<!-- Barra de Filtros -->
<div class="filter-bar">
  <div class="glass-input-group" style="flex: 2; margin-bottom: 0;">
    <label class="glass-input-label">Buscar por Folio o Servicio</label>
    <input type="text" id="filter-search" class="glass-input" placeholder="Ej. DSA-2024-001..." oninput="applyFilters()">
  </div>
  <div class="glass-input-group" style="flex: 1; margin-bottom: 0;">
    <label class="glass-input-label">Filtrar por Año</label>
    <select id="filter-year" class="glass-input" onchange="applyFilters()">
      <option value="ALL">Todos los años</option>
      <option value="2024">2024</option>
      <option value="2023">2023</option>
      <option value="2022">2022</option>
    </select>
  </div>
  <div class="glass-input-group" style="flex: 1; margin-bottom: 0;">
    <label class="glass-input-label">Estatus</label>
    <select id="filter-status" class="glass-input" onchange="applyFilters()">
      <option value="ALL">Cualquier estado</option>
      <option value="FINALIZADO">Finalizados</option>
      <option value="RECHAZADO">Rechazados</option>
      <option value="PROCESO">En Proceso</option>
    </select>
  </div>
</div>

<div id="library-root" class="library-container">
  <!-- Spinner inicial -->
  <div style="display:flex; justify-content:center; padding: 60px;">
    <div class="spinner-primary"></div>
  </div>
</div>

<script>
  let _allExpedientes = [];

  /**
   * Carga inicial de datos desde el servidor.
   */
  async function loadLibrary() {
    const root = document.getElementById('library-root');
    try {
      _allExpedientes = await AsyncRunner.run('getExpedientesLibrary');
      
      // Poblar filtros dinámicos
      populateYearFilter(_allExpedientes);
      
      renderLibrary(_allExpedientes);
    } catch (err) {
      console.error('[Library] Error:', err);
      root.innerHTML = '<p class="error" style="text-align:center; padding:40px; color:var(--color-error);">Error al conectar con la base de datos maestra.</p>';
    }
  }

  /**
   * Genera las opciones del filtro de año dinámicamente.
   */
  function populateYearFilter(data) {
    const filterYear = document.getElementById('filter-year');
    if (!filterYear) return;

    const years = [...new Set(data.map(exp => exp.anio))].sort((a, b) => b - a);
    
    let options = '<option value="ALL">Todos los años</option>';
    years.forEach(year => {
      options += `<option value="${year}">${year}</option>`;
    });
    
    filterYear.innerHTML = options;
  }

  /**
   * Renderiza la estructura agrupada por año.
   */
  function renderLibrary(data) {
    const root = document.getElementById('library-root');
    if (!data || data.length === 0) {
      root.innerHTML = `
        <div class="empty-state" style="text-align:center; padding:80px 20px; background:var(--color-surface); border-radius:var(--radius-lg); border:1px dashed var(--color-neutral-300);">
          <div style="font-size: 48px; margin-bottom: 16px;">📂</div>
          <h3 style="color:var(--color-neutral-900); margin-bottom: 8px;">No se encontraron registros</h3>
          <p style="color:var(--color-neutral-500);">Asegúrese de que existan datos en la "Base de Datos" o intente con otros filtros.</p>
        </div>
      `;
      return;
    }

    // Agrupar por año
    const groups = data.reduce((acc, exp) => {
      const year = exp.anio || 'Desconocido';
      if (!acc[year]) acc[year] = [];
      acc[year].push(exp);
      return acc;
    }, {});

    const years = Object.keys(groups).sort((a, b) => b - a);

    root.innerHTML = years.map(year => `
      <div class="year-section">
        <div class="year-header">
          <span class="year-title">${year}</span>
          <span class="year-count">${groups[year].length} expedientes</span>
        </div>
        <div class="expedientes-list" data-year="${year}">
          ${groups[year].map(exp => {
            const statusClass = exp.estado.includes('RECHAZADO') ? 'rejected' : 
                               (exp.estado === 'FINALIZADO' ? 'finalized' : 'active');
            
            return `
              <div class="expediente-row lib-card-action" 
                   data-uuid="${exp.uuid}" 
                   data-folio="${exp.folio}" 
                   data-servicio="${exp.servicio}" 
                   data-estado="${exp.estado}">
                <div class="folio-cell">${exp.folio}</div>
                <div class="servicio-cell" title="${exp.servicio}">${exp.servicio}</div>
                <div class="fecha-cell">${exp.fecha}</div>
                <div>
                  <span class="status-badge status-${exp.estado.replace(/[^a-zA-Z0-0]/g, '_')}" 
                        style="font-size:10px; padding:2px 8px; text-transform: uppercase;">
                    ${exp.estado.replace('S', 'Fase ')}
                  </span>
                </div>
                <div style="text-align:right; color:var(--color-primary);">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </div>
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `).join('');

    // Event Delegation para la biblioteca
    root.onclick = function(e) {
      const row = e.target.closest('.lib-card-action');
      if (!row) return;
      manageFolio(row.dataset.uuid, row.dataset.folio, row.dataset.servicio, row.dataset.estado);
    };
  }

  /**
   * Aplica los filtros de UI sobre la data en memoria.
   */
  function applyFilters() {
    const search = document.getElementById('filter-search').value.toLowerCase();
    const year = document.getElementById('filter-year').value;
    const status = document.getElementById('filter-status').value;

    const filtered = _allExpedientes.filter(exp => {
      const matchSearch = (exp.folio || '').toLowerCase().includes(search) || 
                          (exp.servicio || '').toLowerCase().includes(search) ||
                          (exp.tipo || '').toLowerCase().includes(search);
      
      const matchYear = year === 'ALL' || exp.anio === year;
      
      let matchStatus = true;
      const est = (exp.estado || '').toUpperCase();
      
      if (status === 'FINALIZADO') matchStatus = est === 'FINALIZADO';
      else if (status === 'RECHAZADO') matchStatus = est.includes('RECHAZADO');
      else if (status === 'PROCESO') matchStatus = !est.includes('FINALIZADO') && !est.includes('RECHAZADO');

      return matchSearch && matchYear && matchStatus;
    });

    renderLibrary(filtered);
  }

  // Iniciar carga
  setTimeout(loadLibrary, 100);
</script>
