<style>
  /* === FORM PANEL PREMIUM STYLES === */
  .form-progress { display: flex; gap: 4px; margin-bottom: 24px; }
  .progress-segment {
    flex: 1; height: 3px; border-radius: 2px; background: rgba(13,59,102,0.06);
    transition: all var(--transition-smooth); position: relative; overflow: hidden;
  }
  .progress-segment.filled { background: var(--color-primary); }
  .progress-segment.filled::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    animation: progressGlow 2s ease-in-out infinite;
  }
  @keyframes progressGlow { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }

  .drop-zone {
    position: relative; margin-bottom: 24px; border-radius: var(--radius-md);
    border: 2px dashed rgba(13,59,102,0.15); padding: 24px 20px;
    text-align: center; cursor: pointer;
    background: linear-gradient(135deg, rgba(13,59,102,0.02), rgba(200,118,62,0.02));
    transition: all var(--duration-normal) var(--ease-out-quart);
    overflow: hidden;
  }
  .drop-zone::before {
    content: ''; position: absolute; inset: 0; border-radius: inherit;
    background: linear-gradient(135deg, rgba(15, 52, 96, 0.04), rgba(233, 69, 96, 0.04));
    opacity: 0; transition: opacity var(--duration-normal);
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: var(--color-primary); background: rgba(13,59,102,0.03);
    transform: translateY(-1px); box-shadow: 0 8px 24px rgba(13,59,102,0.06);
  }
  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 1; }
  .drop-zone.has-file {
    border-style: solid; border-color: rgba(13,59,102,0.2);
    background: rgba(13,59,102,0.02);
  }
  .drop-zone-content { position: relative; z-index: 1; }
  .drop-icon-ring {
    width: 56px; height: 56px; border-radius: 50%; margin: 0 auto 14px;
    background: linear-gradient(135deg, rgba(15, 52, 96, 0.06), rgba(233, 69, 96, 0.06));
    display: flex; align-items: center; justify-content: center;
    transition: transform var(--duration-normal);
  }
  .drop-zone:hover .drop-icon-ring { transform: scale(1.1) rotate(-5deg); }
  .drop-icon-ring svg {
    color: var(--color-primary);
    animation: docBounce 3s ease-in-out infinite;
  }
  @keyframes docBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-3px); } }
  .drop-label { font-size: 13px; font-weight: 600; color: var(--color-neutral-900); margin-bottom: 4px; }
  .drop-hint { font-size: 11px; color: var(--color-neutral-500); font-weight: 400; }
  .drop-zone .file-name {
    font-size: 12px; font-weight: 600; color: var(--color-primary);
    margin-top: 8px; display: none; align-items: center; gap: 6px; justify-content: center;
  }
  .drop-zone.has-file .file-name { display: flex; }
  .drop-zone.has-file .drop-icon-ring svg { animation: none; color: var(--color-success); }
  #intake-file { position: absolute; inset: 0; opacity: 0; cursor: pointer; z-index: 2; width: 100%; }

  .glass-input-group {
    margin-bottom: 18px; position: relative;
    animation: fieldSlideIn 0.5s var(--ease-out-quart) backwards;
  }
  .glass-input-group:nth-child(2) { animation-delay: 0.05s; }
  .glass-input-group:nth-child(3) { animation-delay: 0.1s; }
  .glass-input-group:nth-child(4) { animation-delay: 0.15s; }
  .glass-input-group:nth-child(5) { animation-delay: 0.2s; }
  @keyframes fieldSlideIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

  .glass-input-label {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; font-weight: 700; color: var(--color-neutral-500);
    margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.06em;
    transition: color var(--duration-fast);
  }
  .glass-input-label .step-num {
    width: 20px; height: 20px; border-radius: 6px;
    background: rgba(15, 52, 96, 0.08); color: var(--color-primary);
    font-size: 10px; font-weight: 700; display: flex;
    align-items: center; justify-content: center;
    transition: all var(--duration-normal);
  }
  .glass-input-group:focus-within .glass-input-label .step-num {
    background: var(--color-primary); color: #fff;
    transform: scale(1.1) rotate(-3deg);
    box-shadow: 0 2px 8px rgba(15, 52, 96, 0.25);
  }
  .glass-input-group:focus-within .glass-input-label { color: var(--color-primary); }

  .glass-input {
    width: 100%; padding: 12px 16px; font-size: 14px; font-weight: 500; color: var(--color-neutral-900);
    background: rgba(255, 255, 255, 0.6); backdrop-filter: blur(8px);
    border: 1.5px solid rgba(0,0,0,0.05); border-radius: var(--radius-md);
    outline: none; transition: all var(--duration-normal);
  }
  .glass-input::placeholder { color: var(--color-neutral-400); font-weight: 400; }
  .glass-input:hover { border-color: rgba(15, 52, 96, 0.18); background: rgba(255,255,255,0.85); }
  .glass-input:focus {
    border-color: var(--color-primary); background: rgba(255,255,255,0.95);
    box-shadow: 0 0 0 4px rgba(15, 52, 96, 0.1), var(--shadow-sm);
  }

  .submit-btn {
    width: 100%; padding: 14px 24px; border: none; border-radius: var(--radius-md); cursor: pointer;
    font-size: 14px; font-weight: 700; letter-spacing: -0.01em; color: #fff;
    display: flex; align-items: center; justify-content: center; gap: 10px; position: relative;
    overflow: hidden; margin-top: 8px;
    background: linear-gradient(135deg, var(--color-primary), #1A5276);
    box-shadow: 0 4px 16px rgba(15, 52, 96, 0.25), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: all var(--duration-normal);
  }
  .submit-btn::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, #1A5276, #0A2E4F);
    opacity: 0; transition: opacity var(--duration-normal);
  }
  .submit-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(15, 52, 96, 0.3), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .submit-btn:hover::before { opacity: 1; }
  .submit-btn:active { transform: translateY(0) scale(0.985); box-shadow: 0 2px 8px rgba(15, 52, 96, 0.2); }
  
  .submit-btn .btn-content { position: relative; z-index: 1; display: flex; align-items: center; gap: 10px; }
  .submit-btn .btn-shimmer {
    position: absolute; top: 0; left: -100%; width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    animation: shimmer 3s ease-in-out infinite;
  }
  @keyframes shimmer { 0% { left: -100%; } 50% { left: 150%; } 100% { left: 150%; } }

  .submit-btn .spinner {
    display: none; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite;
  }
  .submit-btn.loading { pointer-events: none; }
  .submit-btn.loading .spinner { display: block; }
  .submit-btn.loading .btn-label { opacity: 0.8; }
  .submit-btn.loading .btn-shimmer { animation: none; opacity: 0; }
  .submit-btn.loading svg { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Cambia el estilo inline del panel derecho o añade esta clase */
  .card[style*="flex: 1 1 35%"] {
    background: var(--glass-bg) !important;
    backdrop-filter: var(--glass-blur) !important;
    -webkit-backdrop-filter: var(--glass-blur) !important;
    border: 1px solid rgba(var(--color-primary-rgb), 0.08) !important;
    box-shadow: var(--shadow-aura-md) !important;
  }
</style>

<div class="split-view" style="display:flex; flex-wrap:wrap; height:calc(100vh - 80px); gap:var(--space-4); box-sizing:border-box;">
  
  <!-- PANEL IZQUIERDO: Visor PDF -->
  <div class="card" style="flex: 1 1 60%; min-width: 300px; display:flex; flex-direction:column; position:relative; overflow:hidden; padding:0;">
    <div style="padding:14px 20px; background:var(--color-surface-dim); border-bottom:1px solid var(--color-neutral-200); display:flex; justify-content:space-between; align-items:center; z-index:3;">
      <div style="font-weight:600; color:var(--color-neutral-900); display:flex; align-items:center; gap:10px; font-size:14px;">
        <span style="width:32px; height:32px; border-radius:var(--radius-sm); background:rgba(15, 52, 96, 0.08); display:flex; align-items:center; justify-content:center; color:var(--color-primary);">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line></svg>
        </span>
        Visor de Documento
      </div>
      
      <!-- Toolbar -->
      <div id="pdf-toolbar" style="display:none; align-items:center; gap:6px;">
        <button type="button" class="btn-ghost btn-sm" onclick="changePage(-1)" aria-label="Página anterior" style="width:32px; height:32px; padding:0; display:flex; align-items:center; justify-content:center;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
        </button>
        <span id="page-num" style="font-size:12px; font-weight:600; font-variant-numeric:tabular-nums; min-width:18px; text-align:center;">0</span>
        <span style="font-size:12px; color:var(--color-neutral-500);">/</span>
        <span id="page-count" style="font-size:12px; color:var(--color-neutral-500); font-variant-numeric:tabular-nums;">0</span>
        <button type="button" class="btn-ghost btn-sm" onclick="changePage(1)" aria-label="Página siguiente" style="width:32px; height:32px; padding:0; display:flex; align-items:center; justify-content:center;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
        </button>
        
        <div style="width:1px; height:16px; background:var(--color-neutral-200); margin:0 4px;"></div>
        
        <button type="button" class="btn-ghost btn-sm" onclick="zoomPDF(-0.25)" aria-label="Alejar" style="width:32px; height:32px; padding:0; display:flex; align-items:center; justify-content:center;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        </button>
        <button type="button" class="btn-ghost btn-sm" onclick="zoomPDF(0.25)" aria-label="Acercar" style="width:32px; height:32px; padding:0; display:flex; align-items:center; justify-content:center;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="11" y1="8" x2="11" y2="14"></line><line x1="8" y1="11" x2="14" y2="11"></line></svg>
        </button>
      </div>
    </div>
    
    <div id="pdf-container" style="flex:1; overflow:auto; background:var(--color-surface); display:flex; justify-content:center; align-items:flex-start; padding:24px; position:relative;">
      <div id="pdf-empty-state" style="margin:auto; text-align:center; color:var(--color-neutral-500); animation:emptyPulse 4s ease-in-out infinite;">
        <div style="width:72px; height:72px; border-radius:50%; margin:0 auto 16px; background:linear-gradient(135deg, rgba(15, 52, 96, 0.08), rgba(233, 69, 96, 0.04)); display:flex; align-items:center; justify-content:center; color:var(--color-primary); position:relative;">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
        </div>
        <p style="font-size:13px; font-weight:500;">Selecciona un archivo PDF para visualizarlo aquí</p>
      </div>
      <canvas id="pdf-canvas" style="display:none; box-shadow:var(--shadow-xl); border-radius:var(--radius-sm); transition:transform var(--duration-normal);"></canvas>
    </div>
  </div>

  <!-- PANEL DERECHO: Formulario -->
  <div class="card" style="flex: 1 1 35%; min-width: 320px; display:flex; flex-direction:column; overflow-y:auto; background:var(--color-surface-dim); padding:28px 26px;">
    
    <h2 style="font-size:22px; font-weight:700; color:var(--color-neutral-900); margin-bottom:28px; display:flex; align-items:center; gap:12px; letter-spacing:-0.02em;">
      <span style="width:40px; height:40px; border-radius:12px; background:linear-gradient(135deg, var(--color-primary), #1A5276); display:flex; align-items:center; justify-content:center; color:#fff; flex-shrink:0; box-shadow:0 4px 14px rgba(15, 52, 96, 0.25);">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
      </span>
      Captura de Oficio
      <span style="font-size:10px; font-weight:600; padding:3px 8px; background:rgba(233, 69, 96, 0.1); color:var(--color-secondary); border-radius:6px; letter-spacing:0.04em; text-transform:uppercase; margin-left:auto;">Nuevo</span>
    </h2>

    <div class="form-progress" id="form-progress">
      <div class="progress-segment" data-field="file"></div>
      <div class="progress-segment" data-field="oficio"></div>
      <div class="progress-segment" data-field="tipo"></div>
      <div class="progress-segment" data-field="fecha"></div>
      <div class="progress-segment" data-field="servicio"></div>
    </div>
    
    <form id="form-intake" onsubmit="handleProcessIntake(event)">
      <!-- Zona de carga de archivo -->
      <div class="drop-zone" id="drop-zone">
        <input type="file" id="intake-file" accept=".pdf" required onchange="handleFileSelect(event)">
        <div class="drop-zone-content">
          <div class="drop-icon-ring">
            <svg id="drop-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
          </div>
          <div class="drop-label" id="drop-label">Oficio Escaneado (.pdf)</div>
          <div class="drop-hint" id="drop-hint">Arrastra o haz clic para seleccionar</div>
          <div class="file-name" id="file-name-display">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>
            <span id="file-name-text"></span>
          </div>
        </div>
      </div>

      <div class="glass-input-group">
        <label class="glass-input-label" for="intake-oficio">
          <span class="step-num">2</span> Referencia de Oficio
        </label>
        <input type="text" id="intake-oficio" class="glass-input" placeholder="Ej. UCI/120/2026" required>
      </div>

      <div class="glass-input-group">
        <label class="glass-input-label" for="intake-tipo">
          <span class="step-num">3</span> Tipo de Trámite
        </label>
        <div style="position:relative;">
          <select id="intake-tipo" class="glass-input" required style="appearance:none;">
            <option value="" disabled selected>Seleccione...</option>
            <option value="COMPRA POR FONDO">Compra por Fondo</option>
            <option value="LICITACION PUBLICA">Licitación Pública</option>
            <option value="ADJUDICACION DIRECTA">Adjudicación Directa</option>
          </select>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="position:absolute; right:14px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--color-neutral-500);"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </div>
      </div>

      <div class="glass-input-group">
        <label class="glass-input-label" for="intake-fecha">
          <span class="step-num">4</span> Fecha de Recepción
        </label>
        <input type="date" id="intake-fecha" class="glass-input" required>
      </div>

      <div class="glass-input-group" style="margin-bottom:28px;">
        <label class="glass-input-label" for="intake-servicio">
          <span class="step-num">5</span> Servicio / Unidad Solicitante
        </label>
        <input type="text" id="intake-servicio" list="unidades-list" class="glass-input" placeholder="Escriba o seleccione..." required autocomplete="off">
        <datalist id="unidades-list">
          <option value="UNIDAD DE CUIDADOS INTENSIVOS">
          <option value="LABORATORIO CLINICO">
          <option value="URGENCIAS ADULTOS">
          <option value="QUIROFANOS CENTRALES">
          <option value="BANCO DE SANGRE">
          <option value="FARMACIA HOSPITALARIA">
        </datalist>
      </div>

      <button type="submit" id="btn-submit-intake" class="submit-btn">
        <span class="btn-shimmer"></span>
        <span class="btn-content">
          <span class="spinner"></span>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
          <span class="btn-label">Registrar y Generar Expediente</span>
        </span>
      </button>
    </form>
  </div>
</div>
