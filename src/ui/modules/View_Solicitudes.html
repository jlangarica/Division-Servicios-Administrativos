<style>
  /* === KANBAN DASHBOARD STYLES === */
  .kanban-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 24px;
    padding: 8px 0;
  }

  .solicitud-card {
    background: var(--color-bg);
    border: 1px solid var(--color-neutral-200);
    border-radius: var(--radius-lg);
    padding: 20px;
    transition: all var(--duration-normal);
    display: flex;
    flex-direction: column;
    gap: 16px;
    box-shadow: var(--shadow-sm);
  }

  .solicitud-card:hover {
    transform: translateY(-4px);
    box-shadow: var(--shadow-lg);
    border-color: var(--color-primary-light);
  }

  .card-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }

  .folio-num {
    font-size: 16px;
    font-weight: 800;
    color: var(--color-primary);
    letter-spacing: -0.02em;
  }

  .status-badge {
    font-size: 10px;
    font-weight: 700;
    padding: 4px 8px;
    border-radius: 6px;
    text-transform: uppercase;
  }

  .status-S01_RECEPCION { background: #E3F2FD; color: #1565C0; }
  .status-S08_PROVEEDOR_COTIZA { background: #FFF3E0; color: #E65100; }
  .status-S02_VERIF_CATALOGO { background: #F3E5F5; color: #7B1FA2; }
  .status-S99_RECHAZADO { background: #FFEBEE; color: #C62828; }

  .card-body {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .servicio-label {
    font-size: 13px;
    font-weight: 600;
    color: var(--color-neutral-800);
  }

  .meta-info {
    font-size: 11px;
    color: var(--color-neutral-500);
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .card-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--color-neutral-100);
  }

  .btn-manage {
    width: 100%;
    justify-content: center;
  }

  .empty-state {
    grid-column: 1 / -1;
    padding: 80px 20px;
    text-align: center;
    background: var(--color-neutral-50);
    border-radius: var(--radius-lg);
    border: 2px dashed var(--color-neutral-200);
  }
</style>

<div class="view-header" style="margin-bottom: 24px;">
  <div>
    <h1 style="font-size: 24px; font-weight: 800; color: var(--color-neutral-900);">Bandeja de Gestión</h1>
    <p style="color: var(--color-neutral-500); font-size: 14px;">Solicitudes activas que requieren tu atención</p>
  </div>
  <button class="btn-primary" onclick="navigateMenu(null, 'ui/modules/View_Solicitudes')">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
    Actualizar
  </button>
</div>

<div id="kanban-container" class="kanban-grid">

  <div style="grid-column: 1/-1; display:flex; justify-content:center; padding: 40px;">
    <div class="spinner-primary"></div>
  </div>
</div>
