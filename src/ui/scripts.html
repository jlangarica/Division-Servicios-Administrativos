/* --- STATE MANAGEMENT --- */
const AppState = (() => {
  let _user = null;
  let _currentView = null;
  const _listeners = new Map();

  return {
    get user()      { return _user; },
    get currentView() { return _currentView; },

    setUser(session) {
      _user = Object.freeze({ ...session });
      this._emit('user:change', _user);
    },

    setCurrentView(path) {
      _currentView = path;
      this._emit('view:change', path);
    },

    /** Subscribe to state changes. Returns unsubscribe fn. */
    on(event, fn) {
      if (!_listeners.has(event)) _listeners.set(event, []);
      _listeners.get(event).push(fn);
      return () => _listeners.get(event).splice(_listeners.get(event).indexOf(fn), 1);
    },

    _emit(event, data) {
      (_listeners.get(event) || []).forEach(fn => fn(data));
    },
  };
})();


/* --- TOAST SYSTEM --- */
const Toast = (() => {
  const container = () => document.getElementById('toast-container');

  function show(message, duration = 3500) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = message;
    container().appendChild(el);

    setTimeout(() => {
      el.classList.add('toast--exit');
      el.addEventListener('animationend', () => el.remove());
    }, duration);
  }

  return { show };
})();


/* --- RIPPLE EFFECT --- */
function createRipple(event) {
  const btn = event.currentTarget;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = event.clientX - rect.left - size / 2;
  const y = event.clientY - rect.top - size / 2;

  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';

  btn.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}

/* --- VIEW RENDERING --- */
let _viewTransitionLock = false;

function renderView(viewPath) {
  if (_viewTransitionLock) return;

  // Cleanup de estados globales al navegar fuera de módulos específicos
  if (AppState.currentView === 'ui/modules/View_Nueva_Solicitud' && viewPath !== 'ui/modules/View_Nueva_Solicitud') {
    window._selectedFileId = null;
    window._ocrExtractedItems = null;
    console.log('[Router] Estado de OCR limpiado al navegar fuera de Nueva Solicitud');
  }

  _viewTransitionLock = true;

  const root = document.getElementById('app-content') || document.getElementById('app-root');

  // Exit animation
  const currentContent = root.querySelector('.view-transition');
  if (currentContent) {
    currentContent.classList.add('view-transition-exit');
    currentContent.addEventListener('animationend', function() {
      loadViewContent(viewPath, root);
    }, { once: true });
  } else {
    loadViewContent(viewPath, root);
  }
}


/* LRU Cache simple (máx 5 vistas en memoria) */
const ViewLRU = new Map();
function cacheView(path, html) {
  if (ViewLRU.size >= 5) { const first = ViewLRU.keys().next().value; ViewLRU.delete(first); }
  ViewLRU.set(path, html);
}

const AsyncRunner = (() => {
  return {
    /**
     * Ejecuta una función del servidor de forma asíncrona.
     * @param {string} methodName Nombre de la función en el servidor.
     * @param {...any} args Argumentos para la función.
     * @returns {Promise<any>} Promesa con el resultado del servidor.
     */
    run(methodName, ...args) {
      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          console.warn(`[AsyncRunner] La llamada a ${methodName} está tardando más de lo esperado...`);
        }, 15000);

        google.script.run
          .withSuccessHandler((res) => {
            clearTimeout(timer);
            resolve(res);
          })
          .withFailureHandler((err) => {
            clearTimeout(timer);
            console.error(`[AsyncRunner] Error en ${methodName}:`, err);

            // Normalizar error para el frontend
            const errorObj = {
              message: err.message || 'Error desconocido en el servidor',
              name: err.name || 'ServerError',
              method: methodName
            };

            reject(errorObj);
          })
          [methodName](...args);
      });
    }
  };
})();

function loadViewContent(viewPath, root) {
  // 1. Cache HIT -> Renderizado instantáneo
  if (ViewLRU.has(viewPath)) {
    injectView(ViewLRU.get(viewPath), root, viewPath);
    return;
  }

  // 2. Cache MISS -> Pedir al servidor
  root.innerHTML = `<div class="view-transition"><div class="loader-container" style="min-height:30vh;"><div class="loader-ring"></div></div></div>`;

  AsyncRunner.run('include', viewPath)
    .then(html => {
      cacheView(viewPath, html);
      injectView(html, root, viewPath);
    })
    .catch(err => {
      console.error('[Router] Error cargando vista:', err);
      _viewTransitionLock = false;
      Toast.show('Error al cargar la vista');
    });
}

function injectView(html, root, viewPath) {
  try {
    // Inyectar HTML base
    root.innerHTML = '<div class="view-transition" style="display:flex; flex-direction:column; flex-grow:1; min-height:0;">' + html + '</div>';
    
    // Extraer y re-ejecutar scripts (innerHTML no ejecuta scripts por seguridad)
    const transitionContainer = root.querySelector('.view-transition');
    const scripts = transitionContainer.querySelectorAll('script');
    scripts.forEach(oldScript => {
      const newScript = document.createElement('script');
      // Copiar atributos si existen
      Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
      // Copiar contenido
      newScript.textContent = oldScript.textContent;
      // Reemplazar para disparar ejecución
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });

    AppState.setCurrentView(viewPath);

    // Focus management para accesibilidad
    const transitionEl = root.querySelector('.view-transition');
    if (transitionEl) {
      transitionEl.setAttribute('tabindex', '-1');
      transitionEl.focus({ preventScroll: true });
    }

    const evt = new CustomEvent('viewLoaded', { detail: { path: viewPath } });
    document.dispatchEvent(evt);
  } catch (renderError) {
    console.error('[Router] Error renderizando vista:', renderError);
    Toast.show('Error al renderizar la vista');
  } finally {
    _viewTransitionLock = false;
  }
}


/* Focus Trap accesible para modales */
function trapFocus(element) {
  const focusables = element.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
  if (focusables.length === 0) return;
  const first = focusables[0], last = focusables[focusables.length - 1];
  element.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });
}

/* --- MODAL --- */
function showModal(title, message, onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML =
    '<div class="modal-content">' +
      '<h2 style="font-size:var(--text-lg);font-weight:700;color:var(--color-neutral-900);margin-bottom:var(--space-4);">' + title + '</h2>' +
      '<p style="font-size:var(--text-sm);color:var(--color-neutral-600);line-height:var(--leading-loose);margin-bottom:var(--space-6);">' + message + '</p>' +
      '<div style="display:flex;gap:var(--space-3);justify-content:flex-end;">' +
        '<button class="btn btn-secondary" id="modal-cancel">Cancelar</button>' +
        '<button class="btn btn-primary" id="modal-confirm">Confirmar</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  trapFocus(overlay.querySelector('.modal-content'));

  overlay.querySelector('#modal-cancel').addEventListener('click', function() {
    overlay.remove();
  });

  overlay.querySelector('#modal-confirm').addEventListener('click', function() {
    overlay.remove();
    if (onConfirm) onConfirm();
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.remove();
  });
}

/**
 * Solicita el motivo de rechazo mediante un modal institucional (sustituye prompt()).
 */
function requestRejectReason() {
  return new Promise((resolve) => {
    const overlay = document.createElement('div');
    overlay.className = 'modal-overlay';
    overlay.innerHTML = `
      <div class="modal-content">
        <h2 style="font-size:var(--text-lg);font-weight:700;margin-bottom:var(--space-4);">Justificación de Rechazo</h2>
        <textarea id="reject-reason-input" class="input-field" rows="4" placeholder="Describa el motivo del rechazo (obligatorio)..." style="margin-bottom:var(--space-4); width:100%; border:1px solid var(--color-neutral-300); border-radius:8px; padding:12px;"></textarea>
        <div style="display:flex;gap:var(--space-3);justify-content:flex-end;">
          <button class="btn btn-secondary" id="modal-cancel">Cancelar</button>
          <button class="btn btn-primary" id="modal-confirm" style="background:var(--color-error); border-color:var(--color-error);">Confirmar Rechazo</button>
        </div>
      </div>`;
    document.body.appendChild(overlay);
    
    overlay.querySelector('#modal-cancel').onclick = () => { overlay.remove(); resolve(null); };
    overlay.querySelector('#modal-confirm').onclick = () => {
      const reason = overlay.querySelector('#reject-reason-input').value.trim();
      if (!reason) { Toast.show('El motivo es obligatorio'); return; }
      overlay.remove();
      resolve(reason);
    };
  });
}

/**
 * Carga las solicitudes activas y renderiza el Kanban.
 */

  const container = document.getElementById('kanban-container');
  if (!container) return;

  try {
    const solicitudes = await AsyncRunner.run('getSolicitudesPorUsuario');
    
    if (!solicitudes || solicitudes.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--color-neutral-300)" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <p style="margin-top:16px; font-weight:600; color:var(--color-neutral-400);">No hay solicitudes pendientes en tu bandeja</p>
        </div>
      `;
      return;
    }

    container.innerHTML = solicitudes.map(s => `
      <div class="solicitud-card" 
           data-uuid="${s.uuid}" 
           data-folio="${s.folio}" 
           data-servicio="${s.servicio}" 
           data-estado="${s.estado}">
        <div class="card-header">
          <span class="folio-num">${s.folio}</span>
          <span class="status-badge status-${s.estado}">${s.estado.replace('S', 'Fase ')}</span>
        </div>
        <div class="card-body">
          <span class="servicio-label">${s.servicio}</span>
          <div class="meta-info">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
            ${s.atiende || 'Sin asignar'}
          </div>
        </div>
        <div class="card-footer">
          <button class="btn-primary btn-manage btn-card-action">
            Gestionar Solicitud
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
          </button>
        </div>
      </div>
    `).join('');

    // Event Delegation para evitar onclick inline inyectados
    container.onclick = function(e) {
      const btn = e.target.closest('.btn-card-action');
      if (!btn) return;
      const card = btn.closest('.solicitud-card');
      manageFolio(card.dataset.uuid, card.dataset.folio, card.dataset.servicio, card.dataset.estado);
    };

  } catch (error) {
    console.error('[Kanban] Error:', error);
    container.innerHTML = '<p class="error">Error al cargar solicitudes.</p>';
  }
}

/**
 * Navega a la vista de gestión para un folio específico.
 */
async function manageFolio(uuid, folio, servicio, estado) {
  document.body.classList.add('is-syncing');
  
  try {
    // Cambiar vista
    renderView('ui/modules/View_Gestion_Folio');
    
    // Cargar detalles desde el servidor
    const details = await AsyncRunner.run('getFolioDetails', uuid);
    if (!details) throw new Error('No se pudo obtener el detalle del folio');

    // Esperar a que el DOM esté listo (después de renderView)
    setTimeout(async () => {
      document.getElementById('folio-display').textContent = details.folio;
      document.getElementById('servicio-display').textContent = details.servicio;
      const badge = document.getElementById('estado-badge');
      badge.textContent = details.estado.replace('S', 'Fase ');
      badge.className = `status-tag status-${details.estado}`;

      // 1. Inyectar Visor Drive (Iframe)
      if (details.pdfFileId) {
        const iframe = `<iframe src="https://drive.google.com/file/d/${details.pdfFileId}/preview" 
                                width="100%" height="100%" style="border:none;" 
                                allow="autoplay"></iframe>`;
        document.getElementById('pdf-container').innerHTML = iframe;
      } else {
        document.getElementById('pdf-container').innerHTML = '<div style="padding:40px; text-align:center; color:var(--color-neutral-400);">No se encontró archivo PDF en Drive</div>';
      }
      
      // 2. Renderizar Panel de Campos (Partials)
      await renderGestionPanel(uuid, details.estado, details.data);
      
      document.body.classList.remove('is-syncing');
    }, 400);

  } catch (err) {
    console.error('[Gestion] Error:', err);
    Toast.show('Error al cargar la gestión del folio');
    document.body.classList.remove('is-syncing');
  }
}

/**
 * Renderiza dinámicamente el panel de campos usando Partials Server-Side.
 */
async function renderGestionPanel(uuid, estado, formData) {
  const fieldsContainer = document.getElementById('dynamic-fields-container');
  const actionBar = document.getElementById('action-bar');
  if (!fieldsContainer || !actionBar) return;

  // 1. Cargar el Partial correspondiente desde el servidor
  try {
    const partialPath = `ui/modules/partials/Form_${estado}`;
    const partialHTML = await AsyncRunner.run('include', partialPath);
    fieldsContainer.innerHTML = partialHTML;

    // Poblar datos si el partial tiene campos con name coincidente
    const form = document.getElementById('active-step-form');
    if (form && formData) {
      Object.keys(formData).forEach(key => {
        const field = form.querySelector(`[name="${key}"]`);
        if (field) field.value = formData[key];
      });
    }
  } catch (err) {
    console.warn(`[Partials] No se encontró partial para el estado ${estado}, usando fallback.`);
    fieldsContainer.innerHTML = '<p style="font-size:12px; color:var(--color-neutral-400);">Esta fase no requiere captura de datos adicionales.</p>';
  }

  // 2. Cargar acciones desde el Motor FSM
  try {
    const actions = await AsyncRunner.run('getAvailableActionsEndpoint', uuid);
    
    actionBar.innerHTML = actions.map(event => {
      const isReject = event === 'REJECT';
      return `
        <button class="btn-${isReject ? 'secondary' : 'primary'}" style="flex:1;" onclick="handleWorkflowAction('${uuid}', '${event}')">
          ${event === 'ADVANCE' ? 'Avanzar Fase' : 'Rechazar / Corregir'}
        </button>
      `;
    }).join('');

    if (actions.length === 0) {
      actionBar.innerHTML = '<p style="font-size:12px; color:var(--color-neutral-500); text-align:center; width:100%;">No tienes permisos para actuar en este estado.</p>';
    }
  } catch (err) {
    console.error('[FSM] Error al obtener acciones:', err);
  }
}

/**
 * Serializa nativamente el formulario activo.
 * Flujo unidireccional sin selectores manuales.
 */
function buildTransitionPayload() {
  const formElement = document.getElementById('active-step-form');
  if (!formElement) return {};
  
  // Serialización nativa via FormData (requiere atributo 'name')
  return Object.fromEntries(new FormData(formElement));
}

/**
 * Despacha un evento al motor de Workflow con bloqueo de UI.
 */
async function handleWorkflowAction(uuid, event) {
  const data = buildTransitionPayload();
  const payload = {
    data: data,
    reason: ''
  };

  // Validación de rechazo (UX Modal vs prompt nativo)
  if (event === 'REJECT') {
    const reason = await requestRejectReason();
    if (!reason) return;
    payload.reason = reason;
  }

  // Bloqueo de UI
  document.body.classList.add('is-syncing');
  Toast.show('Procesando transacción institucional...');
  
  try {
    const res = await AsyncRunner.run('dispatchWorkflowEventEndpoint', uuid, event, payload);
    
    if (res.success) {
      Toast.show('¡Transición exitosa! Folio actualizado.');
      // Destrucción y reconstrucción de la UI (Volver al Kanban)
      navigateMenu(null, 'ui/modules/View_Solicitudes');
    } else {
      Toast.show('Error: ' + res.error);
    }
  } catch (err) {
    console.error('[FSM] Fallo crítico:', err);
    Toast.show('Fallo de red al procesar la transición');
  } finally {
    document.body.classList.remove('is-syncing');
  }
}

async function handleProcessIntake(event) {
  event.preventDefault();

  // ── LEER fileId de MÚLTIPLES fuentes (defensa en profundidad) ──
  // PRIORIDAD: window._selectedFileId PRIMERO (más persistente), luego hidden input, luego form dataset
  console.log('[handleProcessIntake] === INICIO ===');
  console.log('[handleProcessIntake] window._selectedFileId:', window._selectedFileId);
  
  const windowFileId = window._selectedFileId ? String(window._selectedFileId) : '';
  const hiddenInput = document.getElementById('hidden-file-id');
  const hiddenFileId = hiddenInput ? hiddenInput.value : '';
  const form = document.getElementById('form-nueva-solicitud');
  const formFileId = form ? (form.dataset.fileId || '') : '';
  const currentFileId = windowFileId || hiddenFileId || formFileId;
  
  console.log('[handleProcessIntake] windowFileId:', windowFileId);
  console.log('[handleProcessIntake] hiddenFileId:', hiddenFileId);
  console.log('[handleProcessIntake] formFileId:', formFileId);
  console.log('[handleProcessIntake] currentFileId (final):', currentFileId);
  
  // Re-sincronizar el hidden input y form dataset (por si el DOM se re-renderizó)
  if (currentFileId) {
    if (hiddenInput && hiddenInput.value !== currentFileId) {
      hiddenInput.value = currentFileId;
      console.log('[handleProcessIntake] hidden-input.value re-sincronizado a:', currentFileId);
    }
    if (form && form.dataset.fileId !== currentFileId) {
      form.dataset.fileId = currentFileId;
      console.log('[handleProcessIntake] form.dataset.fileId re-sincronizado a:', currentFileId);
    }
  } else {
    console.error('[handleProcessIntake] ⚠️ ALERTA: currentFileId es VACÍO después de leer las 3 fuentes');
  }


  if (!currentFileId) {
    Toast.show('⚠️ Primero selecciona el oficio PDF usando el botón de carga.');
    return;
  }

  const btn = document.getElementById('btn-submit-intake');
  const originalText = btn.innerHTML;
  btn.disabled = true;
  btn.classList.add('loading');
  btn.innerHTML = '<span>Generando Folio...</span>';

  try {
    // ── Construir formData limpio ──
    const formData = {
      tipo_tramite: document.getElementById('intake-tipo').value || '',
      fecha_recepcion: document.getElementById('intake-fecha').value || '',
      servicio_solicitante: document.getElementById('intake-servicio').value || '',
      oficio_solicitud: document.getElementById('intake-oficio').value || '',
      atiende: AppState.user.email || ''
    };

    // Solo agregar campos opcionales si tienen valor real
    const tieneNegativa = document.getElementById('intake-has-negativa').checked;
    if (tieneNegativa) {
      formData.tiene_negativa = true;
      const fechaNeg = document.getElementById('intake-fecha-negativa').value;
      if (fechaNeg) formData.fecha_negativa = fechaNeg;
    }

    // ── PRE-SERIALIZAR a JSON strings (google.script.run no pierde strings) ──
    const formDataJson = JSON.stringify(formData);
    
    let ocrItemsJson = '[]';
    if (window._ocrExtractedItems && Array.isArray(window._ocrExtractedItems) && window._ocrExtractedItems.length > 0) {
      ocrItemsJson = JSON.stringify(window._ocrExtractedItems);
    }

    console.log('[handleProcessIntake] 🚀 ENVIANDO → fileId:', currentFileId, 
                '| formData length:', formDataJson.length, 
                '| ocrItems length:', ocrItemsJson.length);

    // ── LLAMADA DIRECTA con google.script.run (NO usa AsyncRunner) ──
    const res = await new Promise(function(resolve, reject) {
      google.script.run
        .withSuccessHandler(function(result) { resolve(result); })
        .withFailureHandler(function(error) { reject(error); })
        .processIntake(currentFileId, formDataJson, ocrItemsJson);
    });

    console.log('[handleProcessIntake] ✅ Respuesta servidor:', res);

    if (res && res.success) {
      // Limpieza de estado global tras éxito
      window._selectedFileId = null;
      window._ocrExtractedItems = null;

      const hiddenInput = document.getElementById('hidden-file-id');
      if (hiddenInput) hiddenInput.value = '';
      
      Toast.show('✅ ¡Folio generado: ' + res.folio);
      navigateMenu(null, 'ui/modules/View_Solicitudes');
    } else {
      Toast.show('❌ Error: ' + (res ? res.error : 'Respuesta vacía del servidor'));
      btn.disabled = false;
      btn.innerHTML = originalText;
    }
  } catch (err) {
    console.error('[handleProcessIntake] 💥 Error Crítico:', err);
    Toast.show('❌ Error de red o conexión: ' + (err.message || err));
    btn.disabled = false;
    btn.innerHTML = originalText;
  } finally {
    btn.classList.remove('loading');
  }
}

/* --- VIEW INITIALIZATION --- */
document.addEventListener('viewLoaded', function(e) {
  if (e.detail.path === 'ui/modules/View_Dashboard') {
    initDashboard();
  } else if (e.detail.path === 'ui/modules/View_Solicitudes') {
    // init kanban logic if needed
  }
});


async function initDashboard() {
  if (typeof AppState === 'undefined' || !AppState.user) return;

  const { prefix, name, role } = AppState.user;

  const welcomeEl = document.getElementById('welcome-msg');
  const roleEl = document.getElementById('user-role-badge');
  const dateEl = document.getElementById('date-badge');

  if (welcomeEl) welcomeEl.textContent = `Bienvenido(a), ${prefix} ${name}`;
  if (roleEl) roleEl.textContent = role;

  if (dateEl) {
    const now = new Date();
    dateEl.textContent = now.toLocaleDateString('es-MX', {
      weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
    });
  }

  try {
    // 1. Obtener estadísticas reales del servidor
    const stats = await AsyncRunner.run('getDashboardStats');
    if (!stats) return;

    // 2. Actualizar contadores con animación
    const mappings = [
      { id: 'stat-total-expedientes', value: stats.total },
      { id: 'stat-activas', value: stats.activas },
      { id: 'stat-pendientes', value: stats.pendientesAprobacion },
      { id: 'stat-finalizados', value: stats.finalizadas }
    ];

    mappings.forEach(m => {
      const el = document.getElementById(m.id);
      if (el) {
        animateCounter(el, m.value);
      }
    });

    // 3. Renderizar Actividad Reciente
    const activityContainer = document.getElementById('recent-activity-container');
    if (activityContainer && stats.recentActivity) {
      if (stats.recentActivity.length === 0) {
        activityContainer.innerHTML = '<div style="text-align:center; padding: 20px; color: var(--color-neutral-400); font-size: 12px;">Sin actividad reciente</div>';
      } else {
        activityContainer.innerHTML = stats.recentActivity.map(act => {
          const date = new Date(act.timestamp);
          const timeStr = date.toLocaleDateString() + ' ' + date.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
          
          let dotColor = 'var(--color-primary)';
          if (act.evento.includes('REJECT')) dotColor = 'var(--color-error)';
          if (act.evento.includes('ADVANCE')) dotColor = 'var(--color-success)';

          return `
            <div style="display:flex;align-items:flex-start;gap:var(--space-3);padding:var(--space-3);border-radius:var(--radius-md);transition:background 0.2s;" onmouseenter="this.style.background='var(--color-surface-dim)'" onmouseleave="this.style.background='transparent'">
              <div style="width:8px;height:8px;border-radius:50%;background:${dotColor};margin-top:6px;flex-shrink:0;"></div>
              <div>
                <div style="font-size:var(--text-sm);font-weight:500;color:var(--color-neutral-800);">${act.evento}: ${act.uuid.substring(0,8)}...</div>
                <div style="font-size:var(--text-xs);color:var(--color-neutral-500);margin-top:2px;">Por ${act.usuario} · ${timeStr}</div>
              </div>
            </div>
          `;
        }).join('');
      }
    }

  } catch (err) {
    console.error('[Dashboard] Error al cargar estadísticas:', err);
  }
}

function animateCounter(el, target) {
  const duration = 1200;
  let startTime = null;

  const animate = (ts) => {
    if (!startTime) startTime = ts;
    const progress = Math.min((ts - startTime) / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    el.textContent = Math.floor(eased * target).toLocaleString('es-MX');
    if (progress < 1) requestAnimationFrame(animate);
    else el.textContent = target.toLocaleString('es-MX');
  };

  requestAnimationFrame(animate);
}
