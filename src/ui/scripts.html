<script>
  /**
   * Estado global del usuario.
   */
  let currentUser = null;

  /**
   * Valida el acceso del usuario invocando la lógica del servidor.
   */
  async function validateAccess() {
    console.log("Iniciando validación de credenciales...");
    
    google.script.run
      .withSuccessHandler(renderSession)
      .withFailureHandler((err) => {
        console.error("Error crítico de red/servidor:", err);
        renderError();
      })
      .getActiveUserSession();
  }

  /**
   * Procesa el UserDTO devuelto por el servidor.
   * @param {Object|null} session
   */
  function renderSession(session) {
    const root = document.getElementById('app-root');
    const nav = document.getElementById('main-navigation');
    
    if (!session) {
      console.warn("Sesión nula: Acceso no autorizado.");
      nav.classList.replace('nav-visible', 'nav-hidden'); // Asegurar que el nav esté oculto
      renderView('ui/modules/View_Error_Auth');
      return;
    }

    console.log("Sesión validada exitosamente:", session.email);
    currentUser = session;
    
    // 1. Mostrar Navegación y actualizar info de usuario
    nav.classList.remove('nav-hidden');
    nav.classList.add('nav-visible');
    document.getElementById('user-info-badge').innerText = `${session.prefix} ${session.name}`;

    // 2. Inyectar Dashboard por defecto
    renderView('ui/modules/View_Dashboard');
    
    document.body.classList.add('authorized');
  }

  /**
   * Manejador de navegación para la SPA.
   * @param {Event} event Evento del clic.
   * @param {string} viewPath Ruta del archivo HTML a cargar.
   */
  function navigateMenu(event, viewPath) {
    if (event) event.preventDefault();

    // 1. Retroalimentación visual en el menú
    document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active'));
    if (event && event.currentTarget) {
      event.currentTarget.classList.add('active');
    }

    // 2. Carga dinámica del módulo
    renderView(viewPath);
  }

  /**
   * Maneja el cierre de sesión local.
   */
  function handleLogout() {
    if (confirm("¿Está seguro que desea salir del sistema?")) {
      // Limpiar estado local
      currentUser = null;
      // Recargar la página para forzar nueva validación (o mostrar bloqueo)
      window.top.location.href = google.script.host.origin + google.script.host.path;
    }
  }

  /**
   * Helper para renderizar vistas dinámicamente.
   * @param {string} viewPath
   */
  function renderView(viewPath) {
    const root = document.getElementById('app-root');
    
    google.script.run
      .withSuccessHandler((html) => {
        root.innerHTML = html;
        // Disparar evento personalizado si la vista necesita inicialización
        const event = new CustomEvent('viewLoaded', { detail: { path: viewPath } });
        document.dispatchEvent(event);
      })
      .include(viewPath);
  }

  /**
   * Renderiza una vista de error genérica en caso de falla de comunicación.
   */
  function renderError() {
    const root = document.getElementById('app-root');
    root.innerHTML = `
      <div class="error-view">
        <div class="error-card">
          <h1>Error de Conexión</h1>
          <p>No se pudo establecer comunicación con el servidor. Por favor, recarga la página o contacta a soporte.</p>
        </div>
      </div>
    `;
  }
</script>
