<script>
/**
 * ============================================================
 * SPA Core — Sistema de Compras HCG
 * State Management · Router · Transitions · Utilities
 * ============================================================
 */

/* --- STATE MANAGEMENT --- */
const AppState = (() => {
  let _user = null;
  let _currentView = null;
  const _listeners = new Map();

  return {
    get user()      { return _user; },
    get currentView() { return _currentView; },

    setUser(session) {
      _user = Object.freeze({ ...session });
      this._emit('user:change', _user);
    },

    setCurrentView(path) {
      _currentView = path;
      this._emit('view:change', path);
    },

    /** Subscribe to state changes. Returns unsubscribe fn. */
    on(event, fn) {
      if (!_listeners.has(event)) _listeners.set(event, []);
      _listeners.get(event).push(fn);
      return () => _listeners.get(event).splice(_listeners.get(event).indexOf(fn), 1);
    },

    _emit(event, data) {
      (_listeners.get(event) || []).forEach(fn => fn(data));
    },
  };
})();


/* --- TOAST SYSTEM --- */
const Toast = (() => {
  const container = () => document.getElementById('toast-container');

  function show(message, duration = 3500) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = message;
    container().appendChild(el);

    setTimeout(() => {
      el.classList.add('toast--exit');
      el.addEventListener('animationend', () => el.remove());
    }, duration);
  }

  return { show };
})();


/* --- RIPPLE EFFECT --- */
function createRipple(event) {
  const btn = event.currentTarget;
  const rect = btn.getBoundingClientRect();
  const size = Math.max(rect.width, rect.height);
  const x = event.clientX - rect.left - size / 2;
  const y = event.clientY - rect.top - size / 2;

  const ripple = document.createElement('span');
  ripple.className = 'ripple';
  ripple.style.width = ripple.style.height = size + 'px';
  ripple.style.left = x + 'px';
  ripple.style.top = y + 'px';

  btn.appendChild(ripple);
  ripple.addEventListener('animationend', () => ripple.remove());
}


/* --- AUTH --- */
async function validateAccess() {
  console.log('[Auth] Iniciando validación de credenciales...');

  google.script.run
    .withSuccessHandler(renderSession)
    .withFailureHandler(function(err) {
      console.error('[Auth] Error crítico de red/servidor:', err);
      renderError();
    })
    .getActiveUserSession();
}


function renderSession(session) {
  const nav = document.getElementById('main-navigation');

  if (!session) {
    console.warn('[Auth] Sesión nula — acceso no autorizado.');
    nav.classList.replace('nav-visible', 'nav-hidden');
    renderView('ui/modules/View_Error_Auth');
    return;
  }

  console.log('[Auth] Sesión validada:', session.email);
  AppState.setUser(session);

  // Show navigation
  nav.classList.remove('nav-hidden');
  nav.classList.add('nav-visible');

  // Update user badge
  const displayName = session.prefix + ' ' + session.name;
  document.getElementById('user-display-name').textContent = displayName;
  const initials = (session.name || '')
    .split(' ')
    .map(w => w.charAt(0))
    .slice(0, 2)
    .join('')
    .toUpperCase();
  document.getElementById('user-avatar').textContent = initials;

  // Load default view
  renderView('ui/modules/View_Dashboard');

  // Add ripple to all nav buttons
  // document.querySelectorAll('.nav-btn').forEach(function(btn) {
  //   btn.addEventListener('click', createRipple);
  // });

  // Scroll shadow on nav
  window.addEventListener('scroll', function() {
    nav.classList.toggle('nav-scrolled', window.scrollY > 4);
  }, { passive: true });
}


/* --- NAVIGATION --- */
function navigateMenu(event, viewPath) {
  if (event) event.preventDefault();

  // Active state
  document.querySelectorAll('.nav-btn').forEach(function(btn) {
    btn.classList.remove('active');
    btn.setAttribute('aria-selected', 'false');
  });
  if (event && event.currentTarget) {
    event.currentTarget.classList.add('active');
    event.currentTarget.setAttribute('aria-selected', 'true');
  }

  renderView(viewPath);
}


function handleLogout() {
  showModal(
    'Cerrar Sesión',
    '¿Está seguro que desea salir del sistema?',
    function() {
      AppState.setUser(null);
      try {
        const origin = google.script.host.origin;
        const path = google.script.host.path;
        if (origin && path) {
          window.top.location.href = origin + path;
        } else {
          window.top.location.reload();
        }
      } catch (e) {
        // Fallback si google.script.host no está disponible
        console.warn('[Auth] No se pudo construir URL de redirección:', e);
        window.top.location.reload();
      }
    }
  );
}


/* --- VIEW RENDERING --- */
let _viewTransitionLock = false;

function renderView(viewPath) {
  if (_viewTransitionLock) return;
  _viewTransitionLock = true;

  const root = document.getElementById('app-root');

  // Exit animation
  const currentContent = root.querySelector('.view-transition');
  if (currentContent) {
    currentContent.classList.add('view-transition-exit');
    currentContent.addEventListener('animationend', function() {
      loadViewContent(viewPath, root);
    }, { once: true });
  } else {
    loadViewContent(viewPath, root);
  }
}


/* LRU Cache simple (máx 5 vistas en memoria) */
const ViewLRU = new Map();
function cacheView(path, html) {
  if (ViewLRU.size >= 5) { const first = ViewLRU.keys().next().value; ViewLRU.delete(first); }
  ViewLRU.set(path, html);
}

const AsyncRunner = (() => {
  let _requestId = 0;
  return {
    run(methodName, payload) {
      const thisReq = ++_requestId;
      return new Promise((resolve, reject) => {
        google.script.run
          .withSuccessHandler((res) => thisReq === _requestId ? resolve(res) : console.warn(`[AsyncRunner] Ignored stale response: ${methodName}`))
          .withFailureHandler((err) => thisReq === _requestId ? reject(err) : null)
          [methodName](payload);
      });
    }
  };
})();

function loadViewContent(viewPath, root) {
  // 1. Cache HIT -> Renderizado instantáneo
  if (ViewLRU.has(viewPath)) {
    injectView(ViewLRU.get(viewPath), root, viewPath);
    return;
  }

  // 2. Cache MISS -> Pedir al servidor
  root.innerHTML = `<div class="view-transition"><div class="loader-container" style="min-height:30vh;"><div class="loader-ring"></div></div></div>`;

  AsyncRunner.run('include', viewPath)
    .then(html => {
      cacheView(viewPath, html);
      injectView(html, root, viewPath);
    })
    .catch(err => {
      console.error('[Router] Error cargando vista:', err);
      _viewTransitionLock = false;
      Toast.show('Error al cargar la vista');
    });
}

function injectView(html, root, viewPath) {
  try {
    const sanitized = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
    root.innerHTML = '<div class="view-transition">' + sanitized + '</div>';
    AppState.setCurrentView(viewPath);

    // Focus management para accesibilidad
    const transitionEl = root.querySelector('.view-transition');
    if (transitionEl) {
      transitionEl.setAttribute('tabindex', '-1');
      transitionEl.focus({ preventScroll: true });
    }

    const evt = new CustomEvent('viewLoaded', { detail: { path: viewPath } });
    document.dispatchEvent(evt);
  } catch (renderError) {
    console.error('[Router] Error renderizando vista:', renderError);
    Toast.show('Error al renderizar la vista');
  } finally {
    _viewTransitionLock = false;
  }
}


/* Focus Trap accesible para modales */
function trapFocus(element) {
  const focusables = element.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
  if (focusables.length === 0) return;
  const first = focusables[0], last = focusables[focusables.length - 1];
  element.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });
}

/* --- MODAL --- */
function showModal(title, message, onConfirm) {
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML =
    '<div class="modal-content">' +
      '<h2 style="font-size:var(--text-lg);font-weight:700;color:var(--color-neutral-900);margin-bottom:var(--space-4);">' + title + '</h2>' +
      '<p style="font-size:var(--text-sm);color:var(--color-neutral-600);line-height:var(--leading-loose);margin-bottom:var(--space-6);">' + message + '</p>' +
      '<div style="display:flex;gap:var(--space-3);justify-content:flex-end;">' +
        '<button class="btn btn-secondary" id="modal-cancel">Cancelar</button>' +
        '<button class="btn btn-primary" id="modal-confirm">Confirmar</button>' +
      '</div>' +
    '</div>';

  document.body.appendChild(overlay);

  trapFocus(overlay.querySelector('.modal-content'));

  overlay.querySelector('#modal-cancel').addEventListener('click', function() {
    overlay.remove();
  });

  overlay.querySelector('#modal-confirm').addEventListener('click', function() {
    overlay.remove();
    if (onConfirm) onConfirm();
  });

  overlay.addEventListener('click', function(e) {
    if (e.target === overlay) overlay.remove();
  });
}


/* --- ERROR RENDER --- */
function renderError() {
  var root = document.getElementById('app-root');
  root.innerHTML =
    '<div class="view-transition">' +
      '<div class="error-view">' +
        '<div class="error-card">' +
          '<div class="error-icon-wrapper">' +
            '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--color-error)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' +
              '<circle cx="12" cy="12" r="10"/>' +
              '<line x1="12" y1="8" x2="12" y2="12"/>' +
              '<line x1="12" y1="16" x2="12.01" y2="16"/>' +
            '</svg>' +
          '</div>' +
          '<h1>Error de Conexión</h1>' +
          '<p>No se pudo establecer comunicación con el servidor. Por favor, recarga la página o contacta a soporte.</p>' +
          '<div style="margin-top:var(--space-6);">' +
            '<button class="btn btn-primary" onclick="location.reload()">Reintentar</button>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';
}


/* --- KEYBOARD NAV --- */
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var modal = document.querySelector('.modal-overlay');
    if (modal) {
      // Ignorar si es el modal de ingreso de oficio ya que no tiene clase .modal-overlay directa sino display
      if(modal.id !== 'modal-ingreso-oficio') {
          modal.remove();
      }
    }
    
    var modalOficio = document.getElementById('modal-ingreso-oficio');
    if (modalOficio && modalOficio.style.display === 'flex') {
      cerrarModalIngresoOficio();
    }
  }
});

/* --- LOGIC: Ingreso de Oficio (Split View con PDF.js) --- */
let pdfDoc = null;
let pageNum = 1;
let currentZoom = 1.0;
let pageRendering = false;
let pageNumPending = null;

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  if (file.type !== 'application/pdf') {
    Toast.show('Por favor seleccione un archivo PDF válido');
    return;
  }
  
  // Actualizar zona de carga UI
  const dropZone = document.getElementById('drop-zone');
  if (dropZone) {
    dropZone.classList.add('has-file');
    document.getElementById('file-name-text').textContent = file.name;
    document.getElementById('drop-label').textContent = 'Archivo cargado';
    document.getElementById('drop-hint').textContent = 'Haz clic para cambiar';
  }
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const typedarray = new Uint8Array(e.target.result);
    renderPDF(typedarray);
  };
  reader.readAsArrayBuffer(file);
  updateFormProgress();
}

function renderPDF(data) {
  if (typeof pdfjsLib === 'undefined') {
    console.error('PDF.js no está cargado.');
    Toast.show('Error: Motor de PDF no disponible.');
    return;
  }
  
  pdfjsLib.getDocument(data).promise.then(function(pdf) {
    pdfDoc = pdf;
    document.getElementById('page-count').textContent = pdf.numPages;
    document.getElementById('pdf-empty-state').style.display = 'none';
    document.getElementById('pdf-toolbar').style.display = 'flex';
    document.getElementById('pdf-canvas').style.display = 'block';
    pageNum = 1;
    pageRendering = false;
    pageNumPending = null;
    queueRenderPage(pageNum);
  }).catch(function(err) {
    console.error('Error al renderizar PDF:', err);
    Toast.show('Error al procesar el visor PDF');
  });
}

function renderPage(num) {
  pageRendering = true;
  
  pdfDoc.getPage(num).then(function(page) {
    const canvas = document.getElementById('pdf-canvas');
    const ctx = canvas.getContext('2d');
    const viewport = page.getViewport({scale: currentZoom});
    
    canvas.height = viewport.height;
    canvas.width = viewport.width;
    
    const renderContext = {
      canvasContext: ctx,
      viewport: viewport
    };
    
    const renderTask = page.render(renderContext);
    
    renderTask.promise.then(function() {
      pageRendering = false;
      if (pageNumPending !== null) {
        renderPage(pageNumPending);
        pageNumPending = null;
      }
    }).catch(function(err) {
      console.warn("Render task interrupted:", err);
      pageRendering = false;
    });
    
    document.getElementById('page-num').textContent = num;
  });
}

function queueRenderPage(num) {
  if (!pdfDoc) return;
  
  if (pageRendering) {
    pageNumPending = num;
  } else {
    renderPage(num);
  }
}

function changePage(offset) {
  if (!pdfDoc) return;
  const newPage = pageNum + offset;
  if (newPage >= 1 && newPage <= pdfDoc.numPages) {
    pageNum = newPage;
    queueRenderPage(pageNum);
  }
}

function zoomPDF(offset) {
  currentZoom += offset;
  if (currentZoom < 0.5) currentZoom = 0.5;
  if (currentZoom > 3.0) currentZoom = 3.0;
  queueRenderPage(pageNum);
}

function updateFormProgress() {
  // Delegado al motor CSS con la pseudo-clase :has()
}

function setupFormListeners() {
  // Listeners de validación visual delegados a CSS :has()
  
  const dropZone = document.getElementById('drop-zone');
  if (dropZone) {
    dropZone.addEventListener('dragover', function(e) {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });
    dropZone.addEventListener('dragleave', function() {
      dropZone.classList.remove('drag-over');
    });
    dropZone.addEventListener('drop', function(e) {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const files = e.dataTransfer.files;
      if (files.length > 0) {
        document.getElementById('intake-file').files = files;
        handleFileSelect({ target: { files: files } });
      }
    });
  }
}

function handleProcessIntake(event) {
  event.preventDefault();
  
  const fileInput = document.getElementById('intake-file');
  const file = fileInput.files[0];
  if (!file) {
    Toast.show('Falta archivo PDF');
    return;
  }
  
  const btn = document.getElementById('btn-submit-intake');
  btn.classList.add('loading');
  
  const reader = new FileReader();
  reader.onload = function(e) {
    const base64Data = e.target.result.split(',')[1];
    
    const payload = {
      fileData: {
        base64: base64Data,
        fileName: file.name,
        mimeType: file.type
      },
      formData: {
        tipo_tramite: document.getElementById('intake-tipo').value,
        fecha_recepcion: document.getElementById('intake-fecha').value,
        servicio_solicitante: document.getElementById('intake-servicio').value,
        oficio_solicitud: document.getElementById('intake-oficio').value,
        atiende: AppState.user.email
      }
    };
    
    google.script.run
      .withSuccessHandler(function(res) {
        btn.classList.remove('loading');
        if (res.success) {
          Toast.show('¡Expediente generado! Folio: ' + res.folio);
          document.getElementById('form-intake').reset();
          
          // Reset UI state
          document.getElementById('pdf-empty-state').style.display = 'block';
          document.getElementById('pdf-toolbar').style.display = 'none';
          document.getElementById('pdf-canvas').style.display = 'none';
          const dropZone = document.getElementById('drop-zone');
          if (dropZone) dropZone.classList.remove('has-file');
          document.getElementById('drop-label').textContent = 'Oficio Escaneado (.pdf)';
          document.getElementById('drop-hint').textContent = 'Arrastra o haz clic para seleccionar';
          updateFormProgress();
          pdfDoc = null;
        } else {
          Toast.show('Error: ' + res.error);
        }
      })
      .withFailureHandler(function(err) {
        btn.classList.remove('loading');
        Toast.show('Fallo de red al enviar');
      })
      .processIntake(payload);
  };
  reader.readAsDataURL(file);
}

/* --- VIEW INITIALIZATION HANDLERS --- */
document.addEventListener('viewLoaded', function(e) {
  if (e.detail.path === 'ui/modules/View_Dashboard') {
    initDashboard();
  } else if (e.detail.path === 'ui/modules/View_Solicitudes') {
    const fechaEl = document.getElementById('intake-fecha');
    if (fechaEl) fechaEl.valueAsDate = new Date();
    setupFormListeners();
    updateFormProgress();
  }
});

function initDashboard() {
  if (typeof AppState === 'undefined' || !AppState.user) return;

  const { prefix, name, role } = AppState.user;

  const welcomeEl = document.getElementById('welcome-msg');
  const roleEl = document.getElementById('user-role-badge');
  const dateEl = document.getElementById('date-badge');

  if (welcomeEl) welcomeEl.textContent = `Bienvenido(a), ${prefix} ${name}`;
  if (roleEl) roleEl.textContent = role;

  if (dateEl) {
    const now = new Date();
    dateEl.textContent = now.toLocaleDateString('es-MX', {
      weekday: 'short', day: 'numeric', month: 'short', year: 'numeric'
    });
  }

  // Animated counters con easing
  document.querySelectorAll('[data-counter]').forEach(el => {
    const target = parseInt(el.getAttribute('data-counter'), 10);
    const duration = 1200;
    let startTime = null;

    const animate = (ts) => {
      if (!startTime) startTime = ts;
      const progress = Math.min((ts - startTime) / duration, 1);
      const eased = 1 - Math.pow(1 - progress, 3);
      el.textContent = Math.floor(eased * target).toLocaleString('es-MX');
      if (progress < 1) requestAnimationFrame(animate);
      else el.textContent = target.toLocaleString('es-MX');
    };

    requestAnimationFrame(animate);
  });
}
</script>
