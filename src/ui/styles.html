<style>
/* ============================================================
   DESIGN SYSTEM — Sistema de Compras HCG
   Elite Frontend Architecture · White-based Theme
   ============================================================ */

/* --- 1. CUSTOM PROPERTIES (TOKENS) --- */
:root {
  /* Color Palette */
  --color-primary:        #1a73e8;
  --color-primary-light:  #e8f0fe;
  --color-primary-dark:   #1557b0;
  --color-primary-rgb:    26,115,232;

  --color-error:          #d93025;
  --color-error-light:    #fce8e6;
  --color-error-rgb:      217,48,37;

  --color-success:        #1e8e3e;
  --color-success-light:  #e6f4ea;
  --color-success-rgb:    30,142,62;

  --color-warning:        #f9ab00;
  --color-warning-light:  #fef7e0;

  --color-neutral-50:     #f8f9fa;
  --color-neutral-100:    #f1f3f4;
  --color-neutral-200:    #e8eaed;
  --color-neutral-300:    #dadce0;
  --color-neutral-400:    #bdc1c6;
  --color-neutral-500:    #9aa0a6;
  --color-neutral-600:    #80868b;
  --color-neutral-700:    #5f6368;
  --color-neutral-800:    #3c4043;
  --color-neutral-900:    #202124;

  --color-bg:             #ffffff;
  --color-surface:        #ffffff;
  --color-surface-dim:    #f8f9fa;

  /* Typography — sincronizado con README */
  --font-sans:  'DM Sans', 'Segoe UI', -apple-system, sans-serif;
  --font-serif: 'DM Serif Display', Georgia, serif;
  --font-mono:  'JetBrains Mono', 'SF Mono', 'Consolas', monospace;

  --text-2xs:   0.625rem;  /* 10px */
  --text-xs:    0.75rem;   /* 12px */
  --text-sm:    0.8125rem; /* 13px */
  --text-base:  0.875rem;  /* 14px */
  --text-md:    1rem;      /* 16px */
  --text-lg:    1.125rem;  /* 18px */
  --text-xl:    1.25rem;   /* 20px */
  --text-2xl:   1.5rem;    /* 24px */
  --text-3xl:   2rem;      /* 32px */

  --leading-tight:  1.25;
  --leading-normal: 1.5;
  --leading-loose:  1.75;

  /* Spacing Scale */
  --space-1:  0.25rem;  /* 4px */
  --space-2:  0.5rem;   /* 8px */
  --space-3:  0.75rem;  /* 12px */
  --space-4:  1rem;     /* 16px */
  --space-5:  1.25rem;  /* 20px */
  --space-6:  1.5rem;   /* 24px */
  --space-8:  2rem;     /* 32px */
  --space-10: 2.5rem;   /* 40px */
  --space-12: 3rem;     /* 48px */
  --space-16: 4rem;     /* 64px */

  /* Border Radius */
  --radius-sm:  6px;
  --radius-md:  8px;
  --radius-lg:  12px;
  --radius-xl:  16px;
  --radius-2xl: 20px;
  --radius-full: 9999px;

  /* Shadows */
  --shadow-xs:   0 1px 2px rgba(0,0,0,0.04);
  --shadow-sm:   0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
  --shadow-md:   0 4px 6px -1px rgba(0,0,0,0.06), 0 2px 4px -1px rgba(0,0,0,0.04);
  --shadow-lg:   0 10px 15px -3px rgba(0,0,0,0.07), 0 4px 6px -2px rgba(0,0,0,0.03);
  --shadow-xl:   0 20px 25px -5px rgba(0,0,0,0.08), 0 10px 10px -5px rgba(0,0,0,0.02);
  --shadow-2xl:  0 25px 50px -12px rgba(0,0,0,0.15);
  --shadow-inner: inset 0 2px 4px 0 rgba(0,0,0,0.04);

  /* Luminous Shadows */
  --shadow-aura-sm: 0 2px 8px -2px rgba(var(--color-primary-rgb), 0.08);
  --shadow-aura-md: 0 8px 24px -4px rgba(var(--color-primary-rgb), 0.12), 0 0 0 1px rgba(var(--color-primary-rgb), 0.04);
  --shadow-aura-lg: 0 20px 40px -8px rgba(var(--color-primary-rgb), 0.18), 0 0 0 1px rgba(var(--color-primary-rgb), 0.06);
  --shadow-aura-focus: 0 0 0 4px rgba(var(--color-primary-rgb), 0.15);

  /* Glassmorphism Lite */
  --glass-bg: rgba(255, 255, 255, 0.72);
  --glass-border: rgba(255, 255, 255, 0.5);
  --glass-blur: blur(16px);

  /* Transitions */
  --ease-out-expo:  cubic-bezier(0.16, 1, 0.3, 1);
  --ease-out-quart: cubic-bezier(0.25, 1, 0.5, 1);
  --ease-in-out:    cubic-bezier(0.4, 0, 0.2, 1);
  --ease-spring:    cubic-bezier(0.34, 1.56, 0.64, 1);

  --duration-fast:   150ms;
  --duration-normal: 250ms;
  --duration-slow:   400ms;
  --duration-slower: 600ms;

  /* Z-Index Scale */
  --z-base:     1;
  --z-dropdown: 100;
  --z-sticky:   200;
  --z-overlay:  300;
  --z-modal:    400;
  --z-toast:    500;

  /* Layout */
  --nav-height: 60px;
  --content-max-width: 1200px;
}

/* --- 2. RESET & BASE --- */
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

html {
  font-size: 16px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  text-rendering: optimizeLegibility;
  scroll-behavior: smooth;
}

body {
  font-family: var(--font-sans);
  font-size: var(--text-base);
  line-height: var(--leading-normal);
  color: var(--color-neutral-800);
  background-color: var(--color-bg);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-tap-highlight-color: transparent;
}

a { color: var(--color-primary); text-decoration: none; }
a:hover { text-decoration: underline; }

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  background: none;
  outline: none;
  -webkit-tap-highlight-color: transparent;
}

img, svg { display: block; max-width: 100%; }

/* --- 3. LOADER --- */
.loader-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: calc(100vh - var(--nav-height));
  gap: var(--space-6);
}

.loader-ring {
  width: 48px;
  height: 48px;
  position: relative;
  border-radius: 50%;
  /* La estela de cometa */
  background: conic-gradient(from 0deg, transparent 0%, var(--color-primary) 80%, transparent 100%);
  animation: orbitalSpin 1.2s linear infinite;
  -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 4px), black calc(100% - 3px));
  mask: radial-gradient(farthest-side, transparent calc(100% - 4px), black calc(100% - 3px));
}

@keyframes orbitalSpin {
  to { transform: rotate(360deg); }
}

.loader-text {
  font-size: var(--text-sm);
  color: var(--color-neutral-500);
  letter-spacing: 0.02em;
  animation: loaderPulse 2s ease-in-out infinite;
}

@keyframes loaderPulse {
  0%, 100% { opacity: 0.5; }
  50%      { opacity: 1; }
}

/* Loader dots */
.loader-dots {
  display: flex;
  gap: var(--space-1);
}

.loader-dots span {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--color-primary);
  animation: dotBounce 1.4s var(--ease-in-out) infinite;
}

.loader-dots span:nth-child(2) { animation-delay: 0.16s; }
.loader-dots span:nth-child(3) { animation-delay: 0.32s; }

@keyframes dotBounce {
  0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
  40%           { transform: scale(1);    opacity: 1; }
}

/* --- 4. NAVIGATION --- */
#main-navigation {
  display: flex;
  justify-content: space-between;
  align-items: center;
  height: var(--nav-height);
  padding: 0 var(--space-8);
  /* Frosted Glass Base */
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  -webkit-backdrop-filter: var(--glass-blur);
  border-bottom: 1px solid transparent;
  position: sticky;
  top: 0;
  z-index: var(--z-sticky);
  transition: border-color var(--duration-normal) var(--ease-out-expo),
              box-shadow var(--duration-normal) var(--ease-out-expo);
}

#main-navigation.nav-scrolled {
  border-bottom: 1px solid var(--color-neutral-200);
  box-shadow: var(--shadow-aura-sm);
}

.nav-hidden {
  display: none !important;
}

.nav-visible {
  display: flex !important;
  animation: navSlideIn var(--duration-slow) var(--ease-out-expo) both;
}

@keyframes navSlideIn {
  from {
    transform: translateY(-100%);
    opacity: 0;
  }
  to {
    transform: translateY(0);
    opacity: 1;
  }
}

/* Brand */
.nav-brand {
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.brand-icon {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  font-weight: 700;
  font-size: var(--text-sm);
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(var(--color-primary-rgb), 0.3);
}

.brand-text {
  font-weight: 700;
  font-size: var(--text-lg);
  color: var(--color-neutral-900);
  letter-spacing: -0.3px;
  white-space: nowrap;
}

.brand-text span {
  color: var(--color-primary);
}

/* Nav Links */
.nav-links {
  display: flex;
  gap: var(--space-1);
  position: relative;
}

.nav-btn {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: 500;
  color: var(--color-neutral-600);
  transition: color var(--duration-fast) var(--ease-out-quart),
              background-color var(--duration-fast) var(--ease-out-quart),
              transform var(--duration-fast) var(--ease-spring);
  position: relative;
  overflow: hidden;
  white-space: nowrap;
  user-select: none;
}

.nav-btn:hover {
  color: var(--color-primary);
  background: var(--color-primary-light);
  transform: translateY(-1px);
}

.nav-btn:active {
  transform: translateY(0) scale(0.98);
}

.nav-btn.active {
  color: var(--color-primary);
  background: var(--color-primary-light);
  font-weight: 600;
}

.nav-btn.active::after {
  content: '';
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 20px;
  height: 3px;
  background: var(--color-primary);
  border-radius: 3px 3px 0 0;
  animation: activeIndicator var(--duration-normal) var(--ease-spring) both;
}

@keyframes activeIndicator {
  from { width: 0; opacity: 0; }
  to   { width: 20px; opacity: 1; }
}

/* Ripple Effect for Nav Buttons */
.nav-btn .ripple {
  position: absolute;
  border-radius: 50%;
  background: rgba(var(--color-primary-rgb), 0.15);
  transform: scale(0);
  animation: rippleExpand 0.6s var(--ease-out-expo) forwards;
  pointer-events: none;
}

@keyframes rippleExpand {
  to { transform: scale(4); opacity: 0; }
}

/* Icon styles */
.nav-btn .icon {
  width: 18px;
  height: 18px;
  flex-shrink: 0;
  transition: transform var(--duration-fast) var(--ease-spring);
}

.nav-btn:hover .icon {
  transform: scale(1.1);
}

/* User Section */
.nav-user {
  display: flex;
  align-items: center;
  gap: var(--space-4);
}

.user-badge {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-full);
  background: var(--color-surface-dim);
  border: 1px solid var(--color-neutral-200);
  font-size: var(--text-sm);
  color: var(--color-neutral-700);
  transition: all var(--duration-fast) var(--ease-out-quart);
  white-space: nowrap;
}

.user-badge:hover {
  border-color: var(--color-primary-light);
  background: var(--color-primary-light);
}

.user-avatar {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: var(--text-2xs);
  font-weight: 700;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

.logout-btn {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  color: var(--color-neutral-500);
  border: 1px solid transparent;
  transition: all var(--duration-fast) var(--ease-out-quart);
  position: relative;
  overflow: hidden;
}

.logout-btn:hover {
  color: var(--color-error);
  background: var(--color-error-light);
  border-color: rgba(var(--color-error-rgb), 0.15);
}

.logout-btn .icon {
  width: 16px;
  height: 16px;
  transition: transform var(--duration-fast) var(--ease-spring);
}

.logout-btn:hover .icon {
  transform: translateX(2px);
}

/* --- 5. APP ROOT & VIEW TRANSITIONS --- */
#app-root {
  width: 100%;
  max-width: var(--content-max-width);
  margin: 0 auto;
  padding: var(--space-8);
  min-height: calc(100vh - var(--nav-height));
  position: relative;
}

/* View transition wrapper */
.view-transition {
  animation: viewEnter var(--duration-slow) var(--ease-out-expo) both;
}

.view-transition-exit {
  animation: viewExit var(--duration-normal) var(--ease-in-out) both;
}

@keyframes viewEnter {
  from {
    opacity: 0;
    transform: translateY(16px) scale(0.98);
    filter: blur(8px);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

@keyframes viewExit {
  from {
    opacity: 1;
    transform: translateY(0);
  }
  to {
    opacity: 0;
    transform: translateY(-8px);
  }
}

/* --- 6. CARD SYSTEM --- */
.card {
  background: var(--color-surface);
  border-radius: var(--radius-xl);
  border: 1px solid var(--color-neutral-200);
  padding: var(--space-8);
  position: relative;
  overflow: hidden;
  transition: transform var(--duration-slow) var(--ease-spring),
              box-shadow var(--duration-slow) var(--ease-out-expo),
              border-color var(--duration-normal) var(--ease-out-quart);
}

.card:hover {
  border-color: rgba(var(--color-primary-rgb), 0.15);
}

.card-interactive {
  cursor: pointer;
  box-shadow: var(--shadow-aura-sm);
}

.card-interactive:hover {
  transform: translateY(-4px) scale(1.005);
  box-shadow: var(--shadow-aura-lg);
  border-color: rgba(var(--color-primary-rgb), 0.2);
}

.card-interactive:active {
  transform: translateY(-1px) scale(0.995);
  box-shadow: var(--shadow-aura-md);
}

/* Card Shimmer — loading state */
.card-shimmer {
  position: relative;
  overflow: hidden;
}

.card-shimmer::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(
    90deg,
    transparent 0%,
    rgba(var(--color-primary-rgb), 0.03) 40%,
    rgba(var(--color-primary-rgb), 0.06) 50%,
    rgba(var(--color-primary-rgb), 0.03) 60%,
    transparent 100%
  );
  animation: shimmer 2s ease-in-out infinite;
}

@keyframes shimmer {
  from { transform: translateX(-100%); }
  to   { transform: translateX(100%); }
}

/* Card Accent Bar */
.card-accent {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--color-primary), var(--color-primary-dark));
  border-radius: var(--radius-xl) var(--radius-xl) 0 0;
  opacity: 0;
  transition: opacity var(--duration-normal) var(--ease-out-quart);
}

.card-interactive:hover .card-accent {
  opacity: 1;
}

/* --- 7. STAT CARD --- */
.stat-card {
  display: flex;
  align-items: flex-start;
  gap: var(--space-4);
  padding: var(--space-6);
  border-radius: var(--radius-lg);
  background: var(--color-surface);
  border: 1px solid var(--color-neutral-200);
  transition: all var(--duration-normal) var(--ease-out-quart);
  position: relative;
  overflow: hidden;
}

.stat-card:hover {
  border-color: rgba(var(--color-primary-rgb), 0.2);
  box-shadow: var(--shadow-aura-md);
  transform: translateY(-3px);
}

.stat-icon {
  width: 44px;
  height: 44px;
  border-radius: var(--radius-lg);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  transition: transform var(--duration-normal) var(--ease-spring), filter var(--duration-normal);
}

.stat-card:hover .stat-icon {
  transform: scale(1.1) rotate(-5deg);
  filter: drop-shadow(0 4px 6px rgba(var(--color-primary-rgb), 0.25));
}

.stat-icon--primary  { background: var(--color-primary-light); color: var(--color-primary); }
.stat-icon--success  { background: var(--color-success-light); color: var(--color-success); }
.stat-icon--warning  { background: var(--color-warning-light); color: var(--color-warning); }
.stat-icon--error    { background: var(--color-error-light);   color: var(--color-error); }

.stat-content {
  flex: 1;
  min-width: 0;
}

.stat-label {
  font-size: var(--text-sm);
  color: var(--color-neutral-500);
  font-weight: 500;
  margin-bottom: var(--space-1);
  line-height: 1;
}

.stat-value {
  font-size: var(--text-2xl);
  font-weight: 700;
  color: var(--color-neutral-900);
  letter-spacing: -0.5px;
  line-height: var(--leading-tight);
}

.stat-change {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  font-size: var(--text-2xs);
  font-weight: 600;
  padding: 2px 6px;
  border-radius: var(--radius-sm);
  margin-top: var(--space-2);
}

.stat-change--up   { background: var(--color-success-light); color: var(--color-success); }
.stat-change--down { background: var(--color-error-light);   color: var(--color-error); }

/* --- 8. SECTION HEADER --- */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: var(--space-6);
}

.section-header h2 {
  font-size: var(--text-xl);
  font-weight: 700;
  color: var(--color-neutral-900);
  letter-spacing: -0.3px;
  display: flex;
  align-items: center;
  gap: var(--space-3);
}

.section-header h2 .icon-wrapper {
  width: 32px;
  height: 32px;
  border-radius: var(--radius-md);
  background: var(--color-primary-light);
  display: inline-flex;
  align-items: center;
  justify-content: center;
}

.section-header p {
  font-size: var(--text-sm);
  color: var(--color-neutral-500);
  margin-top: var(--space-1);
}

/* --- 9. BUTTONS --- */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-5);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: 600;
  transition: all var(--duration-fast) var(--ease-out-quart);
  position: relative;
  overflow: hidden;
  white-space: nowrap;
  user-select: none;
}

.btn-primary {
  background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
  color: white;
  box-shadow: 0 4px 14px -4px rgba(var(--color-primary-rgb), 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
  position: relative;
  overflow: hidden;
}

/* Efecto de luz que barre el botón */
.btn-primary::after {
  content: '';
  position: absolute;
  top: -50%;
  left: -75%;
  width: 50%;
  height: 200%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transform: skewX(-25deg);
  transition: left var(--duration-slow) var(--ease-out-expo);
}

.btn-primary:hover::after {
  left: 125%;
}

.btn-primary:hover {
  box-shadow: 0 8px 22px -4px rgba(var(--color-primary-rgb), 0.5), inset 0 1px 0 rgba(255,255,255,0.3);
  transform: translateY(-2px);
}

.btn-primary:active {
  transform: translateY(1px);
  /* Efecto de botón presionado físicamente */
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.2), 0 1px 2px rgba(var(--color-primary-rgb), 0.3);
}

.btn-secondary {
  background: var(--color-surface);
  color: var(--color-neutral-700);
  border: 1px solid var(--color-neutral-300);
}

.btn-secondary:hover {
  background: var(--color-surface-dim);
  border-color: var(--color-neutral-400);
  transform: translateY(-1px);
}

.btn-secondary:active {
  transform: translateY(0) scale(0.98);
}

.btn-ghost {
  background: transparent;
  color: var(--color-primary);
}

.btn-ghost:hover {
  background: var(--color-primary-light);
}

.btn-sm {
  padding: var(--space-1) var(--space-3);
  font-size: var(--text-xs);
  border-radius: var(--radius-sm);
}

.btn-lg {
  padding: var(--space-3) var(--space-6);
  font-size: var(--text-md);
  border-radius: var(--radius-lg);
}

/* --- 10. BADGE / CHIP --- */
.badge {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 2px var(--space-3);
  border-radius: var(--radius-full);
  font-size: var(--text-2xs);
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
}

.badge--primary { background: var(--color-primary-light); color: var(--color-primary); }
